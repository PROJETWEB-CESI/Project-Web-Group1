version: '3.9'

services:
  # ===================== REVERSE PROXY =====================
  nginx:
    build: ./infrastructure/nginx
    container_name: nova-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_healthy
      gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  certbot:
    image: certbot/certbot
    container_name: nova-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ===================== FRONTEND =====================
  frontend:
    build: ./frontend/nova-campus-web
    container_name: nova-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DEV_API_PROXY_TARGET=http://gateway:80
    volumes:
      - ./frontend/nova-campus-web/src:/app/src
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ===================== GATEWAY =====================
  gateway:
    build: ./services/gateway
    container_name: nova-gateway
    ports:
      - "8080:80"
    depends_on:
      iam-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ===================== MICROSERVICES =====================
  iam-service:
    build: ./services/iam-service
    container_name: nova-iam
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: novacampus
      DB_USER: nova
      DB_PASSWORD: nova123
      JWT_SECRET: super_long_random_secret_key_change_this_in_production_please
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      ENABLE_TEST_CREDENTIALS: "${ENABLE_TEST_CREDENTIALS:-false}"
    volumes:
      - ./services/iam-service/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  academic-service:
    build: ./services/academic-service
    container_name: nova-academic
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: novacampus
      DB_USER: nova
      DB_PASSWORD: nova123
    volumes:
      - ./services/academic-service/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  scheduling-service:
    build: ./services/scheduling-service
    container_name: nova-scheduling
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: novacampus
      DB_USER: nova
      DB_PASSWORD: nova123
    volumes:
      - ./services/scheduling-service/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  billing-service:
    build: ./services/billing-service
    container_name: nova-billing
    volumes:
      - ./services/billing-service/src:/app/src

  reporting-service:
    build: ./services/reporting-service
    container_name: nova-reporting
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: novacampus
      DB_USER: nova
      DB_PASSWORD: nova123
    volumes:
      - ./services/reporting-service/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  ollama:
    image: ollama/ollama
    container_name: nova-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  ai-agent-service:
    build: ./services/ai-agent-service
    container_name: nova-ai-agent
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:7b
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      JWT_SECRET: super_long_random_secret_key_change_this_in_production_please
      IAM_SERVICE_URL: http://iam-service:3000
      ACADEMIC_SERVICE_URL: http://academic-service:3000
      SCHEDULING_SERVICE_URL: http://scheduling-service:3000
      BILLING_SERVICE_URL: http://billing-service:3000
      REPORTING_SERVICE_URL: http://reporting-service:3000
    volumes:
      - ./services/ai-agent-service:/app
      - ai_chroma_data:/app/data/chroma
      - ai_onnx_cache:/root/.cache/chroma
      - ai_conversations_data:/app/data/conversations
    depends_on:
      ollama:
        condition: service_started
      iam-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  # ===================== SEEDER (one-shot on first compose up) ===============
  seeder:
    build: ./scripts/seed
    container_name: nova-seeder
    restart: "no"
    environment:
      PG_HOST: postgres
      PG_USER: nova
      PG_PASSWORD: nova123
      PG_DB: novacampus
      MONGO_URI: mongodb://mongo:27017/
      MONGO_DB: novacampus
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===================== DATABASES =====================
  postgres:
    image: postgres:16
    container_name: nova-postgres
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova123
      POSTGRES_DB: novacampus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d novacampus"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: nova-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: nova-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  mongo_data:
  ollama_data:
  ai_chroma_data:
  ai_onnx_cache:
  ai_conversations_data:
  certbot_certs:
  certbot_webroot: