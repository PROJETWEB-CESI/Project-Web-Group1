user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Docker's internal DNS — resolves service names at request time,
    # not at startup. Prevents "host not found in upstream" crashes when
    # a downstream service isn't up yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        location /health {
            access_log off;
            return 200 'Gateway is running';
            add_header Content-Type text/plain;
        }

        location /api/auth/ {
            # Strip the /api/auth/ prefix so the service receives /login, /register, /validate, /users etc.
            rewrite ^/api/auth/(.*)$ /$1 break;
            proxy_pass http://iam-service:3000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/academic/ {
            rewrite ^/api/academic/(.*)$ /$1 break;
            proxy_pass http://academic-service:3000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/scheduling/ {
            rewrite ^/api/scheduling/(.*)$ /$1 break;
            proxy_pass http://scheduling-service:3000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /api/billing/ {
            rewrite ^/api/billing/(.*)$ /$1 break;
            proxy_pass http://billing-service:3000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /api/ai/ {
            rewrite ^/api/ai/(.*)$ /$1 break;
            proxy_pass http://ai-agent-service:8000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location / {
            return 404 '{"error": "Not Found"}';
            add_header Content-Type application/json;
        }
    }
}
