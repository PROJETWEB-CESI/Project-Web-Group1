user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # ======================
    # Upstreams (backend services)
    # ======================
    upstream iam_service {
        server iam-service:3000;
    }

    upstream academic_service {
        server academic-service:3000;
    }

    upstream scheduling_service {
        server scheduling-service:3000;
    }

    upstream billing_service {
        server billing-service:3000;
    }

    upstream ai_agent {
        server ai-agent-service:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # ======================
        # Health check
        # ======================
        location /health {
            return 200 'Gateway is running';
            add_header Content-Type text/plain;
        }

        # ======================
        # IAM Service
        # ======================
        location /api/iam/ {
            proxy_pass http://iam_service/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ======================
        # Academic Service
        # ======================
        location /api/academic/ {
            proxy_pass http://academic_service/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ======================
        # Scheduling Service
        # ======================
        location /api/scheduling/ {
            proxy_pass http://scheduling_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ======================
        # Billing Service
        # ======================
        location /api/billing/ {
            proxy_pass http://billing_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ======================
        # AI Agent Service
        # ======================
        location /api/ai/ {
            proxy_pass http://ai_agent/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ======================
        # Default
        # ======================
        location / {
            return 404 '{"error": "Not Found"}';
            add_header Content-Type application/json;
        }
    }
}
