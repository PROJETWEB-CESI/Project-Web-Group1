user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    proxy_redirect off;

    # Docker's internal DNS — resolves service names at request time,
    # not at startup. Prevents "host not found in upstream" crashes when
    # a downstream service isn't up yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name localhost;

        location /health {
            access_log off;
            return 200 'Gateway is running';
            add_header Content-Type text/plain;
        }

        location /api/auth/ {
            proxy_pass http://iam-service:3000/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie            $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /api/notifications {
            proxy_pass http://iam-service:3000/notifications;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie            $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /api/grades {
            proxy_pass http://academic-service:3000/grades;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie            $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /api/attendance {
            proxy_pass http://academic-service:3000/attendance;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie            $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /api/students {
            proxy_pass http://academic-service:3000/students;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie            $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /api/payments {
            proxy_pass http://billing-service:3000/payments;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie            $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /api/rooms {
            proxy_pass http://scheduling-service:3000/rooms;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie            $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /api/dunning {
            proxy_pass http://billing-service:3000/dunning;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie            $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /api/teacher {
            proxy_pass http://academic-service:3000/teacher;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie            $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /api/timetables {
            proxy_pass http://scheduling-service:3000/timetables;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie            $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /api/billing {
            set $upstream http://billing-service:3000;
            # /api/billing?...          → /api/billing?...   (AI agent summary endpoint)
            # /api/billing/payments/... → /api/payments/...
            # /api/billing/dunning/...  → /api/dunning/...
            # /api/billing/health       → /api/health
            rewrite ^/api/billing/(.*)$ /api/$1 break;
            rewrite ^/api/billing$      /api/billing break;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie            $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /api/reporting {
            set $upstream http://reporting-service:3000;
            rewrite ^/api/reporting(/.*)?$ /$1 break;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie            $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /api/ai {
            set $upstream http://ai-agent-service:8000;
            rewrite ^/api/ai/?(.*)$ /$1 break;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie            $http_cookie;
            proxy_pass_header Set-Cookie;
            # LLM responses can take several minutes
            proxy_read_timeout    300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    300s;
            proxy_pass $upstream;
        }

        location / {
            return 404 '{"error": "Not Found"}';
            add_header Content-Type application/json;
        }
    }
}
