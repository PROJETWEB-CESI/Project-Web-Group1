user  nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile          on;
    keepalive_timeout 65;
    server_tokens     off;
    proxy_redirect     off;

    # --- Compression ---
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;

    # --- Static asset proxy cache ---
    proxy_cache_path /var/cache/nginx/static
                     levels=1:2
                     keys_zone=static_cache:10m
                     max_size=500m
                     inactive=60m
                     use_temp_path=off;

    # --- Rate limiting zones (anti brute-force / abuse) ---
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=3r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=10r/s;

    # --- Upstreams (Docker service names, not 127.0.0.1) ---
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    upstream api_gateway {
        server gateway:80;
        keepalive 32;
    }

    # Uncomment when notification-service is added to docker-compose.yml
    # upstream ws_gateway {
    #     server notification-service:3001;
    # }

    # =========================================================
    #  BLOC 1 : HTTP -> HTTPS redirect  +  internal health
    # =========================================================
    server {
        listen 80;
        listen [::]:80;
        server_name novacampus.fr www.novacampus.fr;

        # Docker healthcheck endpoint — never redirect to HTTPS
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================
    #  BLOC 2 : HTTPS - localhost
    # =========================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name localhost;

        # --- TLS for localhost ---
        ssl_certificate      /etc/letsencrypt/live/localhost/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/localhost/privkey.pem;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;

        client_max_body_size 10M;

        # -------------------------------------------------------
        # 1) Auth -> strict rate limit (anti brute-force on IAM)
        # -------------------------------------------------------
        location /api/auth/ {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://api_gateway;
            proxy_pass_header Set-Cookie;
            include    /etc/nginx/proxy_params_common;
            include    /etc/nginx/security_headers.conf;
        }

        # -------------------------------------------------------
        # 2) API -> all traffic goes through API Gateway only
        # -------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api_gateway;
            proxy_pass_header Set-Cookie;
            include    /etc/nginx/proxy_params_common;
            include    /etc/nginx/security_headers.conf;
        }

        # -------------------------------------------------------
        # 4) Next.js static chunks - immutable, long cache
        # -------------------------------------------------------
        location /_next/static/ {
            proxy_pass        http://frontend;
            proxy_cache       static_cache;
            proxy_cache_valid 200 60m;
            include           /etc/nginx/proxy_params_common;
            include           /etc/nginx/security_headers.conf;
            add_header        Cache-Control "public, max-age=31536000, immutable";
        }

        # -------------------------------------------------------
        # 5) Everything else -> Next.js
        # -------------------------------------------------------
        location / {
            proxy_pass http://frontend;
            include    /etc/nginx/proxy_params_common;
            include    /etc/nginx/security_headers.conf;
        }
    }

    # =========================================================
    #  BLOC 3 : HTTPS - novacampus.fr
    # =========================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name novacampus.fr www.novacampus.fr;

        # --- TLS ---
        ssl_certificate      /etc/letsencrypt/live/novacampus.fr/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/novacampus.fr/privkey.pem;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;

        # --- OCSP stapling (requires a real CA-signed cert; ignored for self-signed) ---
        # ssl_stapling        on;
        # ssl_stapling_verify on;
        # resolver            1.1.1.1 8.8.8.8 valid=300s;
        # resolver_timeout    5s;

        client_max_body_size 10M;

        # -------------------------------------------------------
        # 1) Auth -> strict rate limit (anti brute-force on IAM)
        # -------------------------------------------------------
        location /api/auth/ {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://api_gateway;
            proxy_pass_header Set-Cookie;
            include    /etc/nginx/proxy_params_common;
            include    /etc/nginx/security_headers.conf;
        }

        # -------------------------------------------------------
        # 2) API -> all traffic goes through API Gateway only
        # -------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api_gateway;
            proxy_pass_header Set-Cookie;
            include    /etc/nginx/proxy_params_common;
            include    /etc/nginx/security_headers.conf;
        }

        # -------------------------------------------------------
        # 3) WebSocket (room change alerts, grade published, etc.)
        #    Uncomment when notification-service exists in docker-compose.yml
        # -------------------------------------------------------
        # location /ws/ {
        #     proxy_pass         http://ws_gateway;
        #     proxy_http_version 1.1;
        #     proxy_set_header   Upgrade         $http_upgrade;
        #     proxy_set_header   Connection      "upgrade";
        #     proxy_set_header   Host            $host;
        #     proxy_set_header   X-Real-IP       $remote_addr;
        #     proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_read_timeout 3600s;
        #     proxy_buffering    off;
        #     include /etc/nginx/security_headers.conf;
        # }

        # -------------------------------------------------------
        # 4) Next.js static chunks - immutable, long cache
        #    security_headers.conf is included explicitly here
        #    to avoid nginx's add_header inheritance stripping them
        # -------------------------------------------------------
        location /_next/static/ {
            proxy_pass        http://frontend;
            proxy_cache       static_cache;
            proxy_cache_valid 200 60m;
            include           /etc/nginx/proxy_params_common;
            include           /etc/nginx/security_headers.conf;
            add_header        Cache-Control "public, max-age=31536000, immutable";
        }

        # -------------------------------------------------------
        # 5) Everything else -> Next.js (the 4 role dashboards)
        # -------------------------------------------------------
        location / {
            proxy_pass http://frontend;
            include    /etc/nginx/proxy_params_common;
            include    /etc/nginx/security_headers.conf;
        }
    }
}
